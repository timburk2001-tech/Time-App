<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="#1a1a1a"/>

  <!-- Clock ring -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>

  <!-- Tick marks (all 12, rotated from 12 o'clock baseline) -->
  <g stroke="white" stroke-linecap="round">
    <line x1="256" y1="78" x2="256" y2="106" stroke-width="5" stroke-opacity="0.55" transform="rotate(0,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(30,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(60,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="106" stroke-width="5" stroke-opacity="0.55" transform="rotate(90,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(120,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(150,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="106" stroke-width="5" stroke-opacity="0.55" transform="rotate(180,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(210,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(240,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="106" stroke-width="5" stroke-opacity="0.55" transform="rotate(270,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(300,256,256)"/>
    <line x1="256" y1="78" x2="256" y2="99"  stroke-width="3" stroke-opacity="0.25" transform="rotate(330,256,256)"/>
  </g>

  <!-- Hour hand (10 o'clock) -->
  <line x1="256" y1="256" x2="166" y2="204" stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Minute hand (pointing to 2 / 10-minute mark) -->
  <line x1="256" y1="256" x2="377" y2="186" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="white"/>
</svg>
